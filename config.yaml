model:
  encoder_name: roberta-base
  local_files_only: true
  freeze_text_encoder: true
  allow_mock_encoder_fallback: true
  encoder_hidden_size: 768
  mock_vocab_size: 4096
  max_tokens: 96
  role_vocab:
    - self
    - other
    - narrator
  role_embedding_dim: 32
  utterance_dim: 768
  character_dim: 64
  character_hidden_dim: 256
  char_step_dim: 128
  turn_distance_buckets: 16
  turn_distance_embedding_dim: 16
  memory_window: 12
  context_attention_heads: 8
  recurrent_hidden_size: 512
  recurrent_layers: 2
  recurrent_dropout: 0.1
  latent_dim: 128
  vad_dim: 3
  appraisal_dim: 5
  discrete_dim: 14
  gate_type: context
  gate_hidden_dim: 256

training:
  batch_size: 2
  num_workers: 0
  base_epochs: 4
  gate_epochs: 2
  joint_epochs: 2
  lr: 0.0002
  gate_lr: 0.0001
  joint_lr: 0.0001
  encoder_lr: 0.00001
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  contrastive_margin: 0.5
  label_smoothing: 0.0
  joint_gate_scale: 0.5
  checkpoint_dir: checkpoints
  seed: 42
  loss_weights:
    vad: 1.0
    appraisal: 0.7
    discrete: 0.5
    smoothness: 0.05
    contrastive: 0.1
    consistency: 0.02
    gate_smoothness: 0.15
    gate_fidelity: 0.2

data:
  train_path: sample_data/train.jsonl
  val_path: sample_data/val.jsonl

inference:
  output_path: outputs/inference.json
