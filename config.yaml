model:
  encoder: "roberta-base"
  freeze_encoder: true
  unfreeze_top_layers: 2          # unfreeze after phase 1 plateau
  mode_dim: 32
  gru_hidden: 256
  gru_layers: 2
  gru_dropout: 0.2
  interpretable_dims: 5           # valence, arousal, playfulness, shyness, affection
  latent_dims: 8
  output_dims: 13                 # 5 + 8

emotion:
  interpretable:
    - valence
    - arousal
    - playfulness
    - shyness
    - affection
  # per-dim smoothness weights — slow dims penalized more
  smoothness_weights:
    valence:     0.15
    arousal:     0.05             # allow fast spikes
    playfulness: 0.10
    shyness:     0.25             # should move slowly
    affection:   0.25             # should move slowly
  # weak label dims — lower loss weight early
  weak_label_dims:
    - playfulness
    - shyness
    - affection
  weak_label_weight: 0.3          # multiply loss for weak dims in phase 1-2

modes:
  - SPEAKING
  - LISTENING
  - REACTING
  - THINKING
  - IDLE

training:
  batch_size: 16
  max_clauses: 16
  max_tokens_per_clause: 64
  learning_rate: 2.0e-4
  encoder_lr: 1.0e-5              # lower lr when unfreezing encoder
  weight_decay: 0.01
  max_epochs: 50
  patience: 5                     # early stopping
  phase1_epochs: 10               # valence/arousal only
  phase2_epochs: 20               # add weak dims
  loss_weights:
    interpretable: 1.0
    contrastive: 0.3
    smoothness: 0.1
  contrastive_temperature: 0.07
  contrastive_margin: 0.5

data:
  # Output of build_dataset.py
  train_path: "emotion_data/train.csv"
  val_path:   "emotion_data/val.csv"
  eval_set_path: "emotion_data/eval.csv"   # or "data/eval_set.csv" for old hand-curated format
  contrastive_pairs_path: "emotion_data/contrastive_pairs.csv"
  seed: 42

logging:
  log_dir: "runs/"
  save_dir: "checkpoints/"
  eval_every_n_epochs: 1
  visualize_every_n_epochs: 2
