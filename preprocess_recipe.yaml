character_vectors:
  dim: 32
  strategy: dataset_character
  seed: 42

turn_distance:
  max_value: 15

splits:
  train: 0.8
  val: 0.1
  test: 0.1
  seed: 42

output:
  dir: processed_data
  train_file: train.jsonl
  val_file: val.jsonl
  test_file: test.jsonl
  stats_file: stats.json

datasets:
  - name: goemotions
    adapter: single_turn_table
    format: csv
    path: C:\Users\SSAFY\.cache\kagglehub\datasets\shivamb\go-emotions-google-emotions-dataset\versions\1\go_emotions_dataset.csv
    text_field: text
    dialogue_field: id
    character_field: id
    discrete_map: goemotions
    multi_label_policy: first_supported
    discrete_onehot_fields:
      - admiration
      - amusement
      - anger
      - annoyance
      - approval
      - caring
      - confusion
      - curiosity
      - desire
      - disappointment
      - disapproval
      - disgust
      - embarrassment
      - excitement
      - fear
      - gratitude
      - grief
      - joy
      - love
      - nervousness
      - optimism
      - pride
      - realization
      - relief
      - remorse
      - sadness
      - surprise
      - neutral

  - name: emobank
    adapter: single_turn_table
    format: csv
    path: C:\Users\SSAFY\.cache\kagglehub\datasets\jackksoncsie\emobank\versions\1\emobank.csv
    text_field: text
    dialogue_field: id
    character_field: id
    split_field: split
    vad_fields: [V, A, D]
    vad_range: [1.0, 5.0]

  - name: dailydialog_train
    adapter: packed_dialogue_table
    format: csv
    path: C:\Users\SSAFY\.cache\kagglehub\datasets\thedevastator\dailydialog-unlock-the-conversation-potential-in\versions\2\train.csv
    fixed_split: train
    text_field: dialog
    emotion_field: emotion
    discrete_field: emotion
    discrete_map: dailydialog

  - name: dailydialog_validation
    adapter: packed_dialogue_table
    format: csv
    path: C:\Users\SSAFY\.cache\kagglehub\datasets\thedevastator\dailydialog-unlock-the-conversation-potential-in\versions\2\validation.csv
    fixed_split: val
    text_field: dialog
    emotion_field: emotion
    discrete_field: emotion
    discrete_map: dailydialog

  - name: dailydialog_test
    adapter: packed_dialogue_table
    format: csv
    path: C:\Users\SSAFY\.cache\kagglehub\datasets\thedevastator\dailydialog-unlock-the-conversation-potential-in\versions\2\test.csv
    fixed_split: test
    text_field: dialog
    emotion_field: emotion
    discrete_field: emotion
    discrete_map: dailydialog

  - name: empatheticdialogues
    adapter: empathetic_dialogues_csv
    format: csv
    path: C:\Users\SSAFY\.cache\kagglehub\datasets\atharvjairath\empathetic-dialogues-facebook-ai\versions\1\emotion-emotion_69k.csv
    prompt_field: empathetic_dialogues
    response_field: labels
    discrete_field: emotion
    discrete_map: empatheticdialogues

  - name: meld_train
    adapter: dialogue_table
    format: csv
    path: raw\MELD\train_sent_emo.csv
    fixed_split: train
    dialogue_field: Dialogue_ID
    turn_field: Utterance_ID
    speaker_field: Speaker
    text_field: Utterance
    discrete_field: Emotion
    discrete_map: meld
    skip_if_missing: true

  - name: meld_dev
    adapter: dialogue_table
    format: csv
    path: raw\MELD\dev_sent_emo.csv
    fixed_split: val
    dialogue_field: Dialogue_ID
    turn_field: Utterance_ID
    speaker_field: Speaker
    text_field: Utterance
    discrete_field: Emotion
    discrete_map: meld
    skip_if_missing: true

  - name: meld_test
    adapter: dialogue_table
    format: csv
    path: raw\MELD\test_sent_emo.csv
    fixed_split: test
    dialogue_field: Dialogue_ID
    turn_field: Utterance_ID
    speaker_field: Speaker
    text_field: Utterance
    discrete_field: Emotion
    discrete_map: meld
    skip_if_missing: true

